  const filas=COMP.map(c=>{const p=ev.puntajes[c.id],pa=auto?.puntajes?.[c.id];const e1=ESCALA.find(x=>x.v===p),e2=ESCALA.find(x=>x.v===pa);const diff=(p!==undefined&&pa!==undefined)?p-pa:null;const dc=diff===null?"#999":diff>0?"#0F6E56":diff<0?"#E24B4A":"#185FA5";const dl=diff===null?"—":diff>0?`+${diff}▲`:diff<0?`${diff}▼`:"=";return `<tr><td style="padding:6px 9px;border-bottom:1px solid #eee;font-size:11px">${c.id}. ${c.n}</td><td style="padding:6px;text-align:center;font-weight:700;color:${e1?.c||"#999"};border-bottom:1px solid #eee">${p??"-"}</td>${auto?`<td style="padding:6px;text-align:center;font-weight:700;color:${e2?.c||"#999"};border-bottom:1px solid #eee">${pa??"-"}</td><td style="padding:6px;text-align:center;font-weight:600;color:${dc};border-bottom:1px solid #eee">${dl}</td>`:""}</tr>`;}).join("");

</body></html>`);w.document.close();
}

function RTE({value,onChange,ph="Escribe observaciones..."}){
  const ref=useRef(null);const init=useRef(false);
  useEffect(()=>{if(ref.current&&!init.current){ref.current.innerHTML=value||'';init.current=true;}},[]);
  const ex=cmd=>{document.execCommand(cmd,false,null);ref.current.focus();onChange(ref.current.innerHTML);};
  const B=({label,cmd,s={}})=><button type="button" onClick={()=>ex(cmd)} style={{padding:'4px 10px',borderRadius:6,border:'1px solid #d0d5dd',background:'#f0f0f0',cursor:'pointer',fontSize:12,fontFamily:'inherit',...s}}>{label}</button>;
  return(<div><div style={{display:'flex',gap:4,padding:'6px 8px',background:'#f8f9fa',border:'1px solid #d0d5dd',borderBottom:'none',borderRadius:'8px 8px 0 0',flexWrap:'wrap'}}>
    <B label={<b>N</b>} cmd="bold"/><B label={<i>K</i>} cmd="italic"/><B label={<u>S</u>} cmd="underline"/>
    <span style={{width:1,height:18,background:'#ddd',margin:'auto 2px',display:'inline-block'}}/>
    <B label="• Viñetas" cmd="insertUnorderedList"/><B label="1. Numerado" cmd="insertOrderedList"/>
    <span style={{width:1,height:18,background:'#ddd',margin:'auto 2px',display:'inline-block'}}/>
    <B label="✕" cmd="removeFormat" s={{color:'#888'}}/>
  </div>
  <div ref={ref} contentEditable suppressContentEditableWarning onInput={e=>onChange(e.currentTarget.innerHTML)}
    style={{minHeight:90,border:'1px solid #d0d5dd',borderRadius:'0 0 8px 8px',padding:'10px 12px',fontSize:13,lineHeight:1.7,outline:'none',background:'#fff',fontFamily:'inherit'}} data-ph={ph}/></div>);
}

        );})}
        {!esC&&<div style={{marginTop:20,paddingTop:16,borderTop:"1px solid #eee",display:"flex",justifyContent:"flex-end"}}>
          <button className="btn btn-danger btn-sm" onClick={async()=>{if(!confirm(`¿Eliminar "${emp.nombre}"?`))return;await fbDel("empresas",eaId);for(const e of empList){await fbDel("empleados",e.id);for(const ev of evaluaciones.filter(x=>x.empleado_id===e.id))await fbDel("evaluaciones",ev.id);for(const a of autoevals.filter(x=>x.empleado_id===e.id))await fbDel("autoevals",a.id);}await load();setPag("empresas");}}>Eliminar empresa</button>
        </div>}
      </div></div>
    );
  }

  if(pag==="new_per")return(
    <div style={{minHeight:"100vh",background:"#f5f6fa"}}><div style={{maxWidth:500,margin:"0 auto",padding:"24px 20px"}}>
      <TB t="Nuevo empleado" back={()=>setPag("empresa")}/>
      <div className="card">
        <div className="sec-title">Datos del empleado</div>
        <div style={{marginBottom:12}}><span className="lbl">Nombre completo</span><input value={enN} onChange={e=>setEnN(e.target.value)} placeholder="Nombre y apellido"/></div>
        <div style={{marginBottom:16}}><span className="lbl">Cargo</span><input value={enC} onChange={e=>setEnC(e.target.value)} placeholder="Cargo que desempeña"/></div>
        {enM&&<div style={{fontSize:12,color:enM.startsWith("✓")?"#0F6E56":"#E24B4A",marginBottom:10}}>{enM}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button className="btn btn-outline" onClick={()=>setPag("empresa")}>Cancelar</button>
          <button className="btn btn-gold" onClick={async()=>{if(!enN||!enC){setEnM("Completa todos los campos");return;}const id="per_"+uid();const d={nombre:enN,cargo:enC,empresa_id:eaId};await fbSet("empleados",id,d);setEmpleados(p=>[...p,{id,...d}]);setEnM("✓ Agregado");setTimeout(()=>{setEoId(id);setPag("empleado");},600);}}>Agregar</button>
        </div>
      </div>
    </div></div>
  );

  if(pag==="empleado"&&per){
    const pr=evList.length?avg(evList.map(ev=>avg(Object.values(ev.puntajes)))):null;
    return(
      <div style={{minHeight:"100vh",background:"#f5f6fa"}}><div style={{maxWidth:860,margin:"0 auto",padding:"24px 20px"}}>
        <TB t={per.nombre} s={per.cargo} back={()=>setPag("empresa")}/>
        <div className="grid3" style={{marginBottom:20}}>
          {[["Evaluaciones",evList.length],["Autoevaluaciones",auList.length],["Promedio",pr?pr.toFixed(2):"—"]].map(([l,v],i)=>(
            <div key={l} className="metric" style={{borderLeft:`3px solid ${CC.ac}`}}>
              <div style={{fontSize:11,color:"#888",textTransform:"uppercase"}}>{l}</div>
              <div style={{fontSize:26,fontWeight:700,color:i===2&&pr?cp(pr):CC.ac}}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div className="sec-title" style={{marginBottom:0}}>Evaluaciones 360°</div>
          {!esC&&<button className="btn btn-sm" style={{background:CC.ac,color:"#fff",border:"none"}} onClick={()=>{rEv();setPag("new_eval");}}>+ Nueva</button>}
        </div>
        {!evList.length&&<div className="card" style={{color:"#bbb",fontSize:13,textAlign:"center",padding:20}}>Sin evaluaciones.</div>}
        {evList.map(ev=>{const p=avg(Object.values(ev.puntajes));const f=fbk(p,per.nombre);const open=oEv===ev.id;return(
          <div key={ev.id} className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div>
                <span style={{fontWeight:600,fontSize:13}}>{ev.tipo||"Evaluación 360°"}</span>
                <span style={{fontSize:11,color:"#aaa",marginLeft:8}}>{ev.periodo_desde} → {ev.periodo_hasta}</span>
                <span style={{fontSize:11,color:"#bbb",marginLeft:8}}>{ev.fecha}</span>
                {ev.evaluadores?.length>0&&<div style={{fontSize:11,color:"#888",marginTop:2}}>Evaluadores: {ev.evaluadores.map(e=>e.nombre).join(", ")}</div>}
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span className="badge" style={{background:cp(p)+"22",color:cp(p)}}>{p.toFixed(2)} — {lp(p)}</span>
                <button className="btn btn-outline btn-sm" onClick={()=>setOEv(open?null:ev.id)}>{open?"Ocultar":"Ver"}</button>
              </div>
            </div>
            {open&&(<div style={{marginTop:16,borderTop:"1px solid #f0f0f0",paddingTop:14}}>
              {COMP.map(c=>{const cp2=ev.puntajes[c.id];const ce=ESCALA.find(x=>x.v===cp2);const ap=lastAu?.puntajes?.[c.id];return(
                <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:7}}>
                  <div style={{fontSize:12,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.id}. {c.n}</div>
                  <div style={{width:90,flexShrink:0}}><div className="prog"><div className="prog-fill" style={{width:`${((cp2||0)/5)*100}%`,background:ce?.c||"#eee"}}/></div></div>
                  <span style={{fontSize:12,fontWeight:600,color:ce?.c||"#999",minWidth:28}}>{cp2??"-"}</span>
                  {ap!==undefined&&<span style={{fontSize:11,color:"#aaa",minWidth:44}}>auto:{ap}</span>}
                </div>
              );})}
              <div style={{marginTop:14}}><div className="sec-title" style={{fontSize:13}}>Retroalimentación</div>
                {[["Estado actual",f.e],["Lo que se resalta",f.r],["Áreas de mejora",f.m],["Recomendaciones",f.rc],["Herramientas",f.h],["Expectativas",f.ex]].map(([t,v])=>(
                  <div key={t} className="fb"><h4>{t}</h4><p>{v}</p></div>
                ))}
                {ev.observaciones&&<div style={{background:"#fffbf0",border:"1px solid #e8a627",borderRadius:8,padding:"12px 16px",marginBottom:12}}>
                  <div style={{fontSize:10,color:GOLD,fontWeight:700,textTransform:"uppercase",marginBottom:6}}>Observaciones</div>
                  <div className="obs-display" dangerouslySetInnerHTML={{__html:ev.observaciones}}/>
                </div>}
              </div>
              <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
                <button className="btn btn-gold btn-sm" onClick={()=>pdfInforme(per,ev,lastAu,emp?.nombre||"")}>PDF</button>
                {!esC&&<>
                  <button className="btn btn-outline btn-sm" onClick={()=>{setFT(ev.tipo||"jefe");setFD(ev.periodo_desde||"");setFH(ev.periodo_hasta||"");setFP({...ev.puntajes});setFO(ev.observaciones||"");setFEv(ev.evaluadores?.length?ev.evaluadores:[{nombre:"",rol:""}]);setEEv(ev.id);setPag("new_eval");}}>Editar</button>
                  <button className="btn btn-danger btn-sm" onClick={async()=>{if(!confirm("¿Eliminar?"))return;await fbDel("evaluaciones",ev.id);setEvaluaciones(p=>p.filter(e=>e.id!==ev.id));setOEv(null);}}>Eliminar</button>
                </>}
              </div>
            </div>)}
          </div>
        );})}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"20px 0 14px"}}>
          <div className="sec-title" style={{marginBottom:0}}>Autoevaluación</div>
          {!esC&&<button className="btn btn-blue btn-sm" onClick={()=>{rAu();setPag("new_auto");}}>+ Nueva</button>}
        </div>
        {!auList.length&&<div className="card" style={{color:"#bbb",fontSize:13,textAlign:"center",padding:20}}>Sin autoevaluaciones.</div>}
        {auList.map(a=>{const open=oAu===a.id;return(
          <div key={a.id} className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><span style={{fontWeight:600,fontSize:13}}>Autoevaluación</span><span style={{fontSize:11,color:"#aaa",marginLeft:8}}>{a.fecha}</span></div>
              <button className="btn btn-outline btn-sm" onClick={()=>setOAu(open?null:a.id)}>{open?"Ocultar":"Ver"}</button>
            </div>
            {open&&(<div style={{marginTop:14,borderTop:"1px solid #f0f0f0",paddingTop:14}}>
              {AQ.map(q=>{const v=a.puntajes?.[q.id];const r=a.respuestas?.[q.id];const e=AE.find(x=>x.v===v);return(
                <div key={q.id} style={{marginBottom:12,paddingBottom:12,borderBottom:"1px solid #f5f5f5"}}>
                  <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>{q.t}</div>
                  {v&&<span className="badge" style={{background:"#185FA522",color:"#185FA5",marginBottom:4}}>{v} — {e?.l}</span>}
                  {r&&<p style={{fontSize:12,color:"#666",marginTop:4,fontStyle:"italic"}}>"{r}"</p>}
                </div>
              );})}
              {a.observaciones&&<div style={{background:"#eef6ff",border:"1px solid #185FA5",borderRadius:8,padding:"12px 16px",marginBottom:12}}>
                <div style={{fontSize:10,color:"#185FA5",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>Reflexión personal</div>
                <div className="obs-display" dangerouslySetInnerHTML={{__html:a.observaciones}}/>
              </div>}
              {!esC&&<div style={{display:"flex",gap:8}}>
                <button className="btn btn-outline btn-sm" onClick={()=>{setAP({...a.puntajes});setAR({...(a.respuestas||{})});setAO(a.observaciones||"");setEAu(a.id);setPag("new_auto");}}>Editar</button>
                <button className="btn btn-danger btn-sm" onClick={async()=>{if(!confirm("¿Eliminar?"))return;await fbDel("autoevals",a.id);setAutoevals(p=>p.filter(x=>x.id!==a.id));setOAu(null);}}>Eliminar</button>
              </div>}
            </div>)}
          </div>
        );})}
        {!esC&&<div style={{marginTop:20,paddingTop:16,borderTop:"1px solid #eee",display:"flex",justifyContent:"flex-end"}}>
          <button className="btn btn-danger btn-sm" onClick={async()=>{if(!confirm(`¿Eliminar a "${per.nombre}"?`))return;await fbDel("empleados",eoId);for(const ev of evList)await fbDel("evaluaciones",ev.id);for(const a of auList)await fbDel("autoevals",a.id);await load();setPag("empresa");}}>Eliminar empleado</button>
        </div>}
      </div></div>
    );
  }

  if(pag==="new_eval"&&per){
    const ok=Object.keys(fP).length===12&&fD&&fH;
    const pL=Object.keys(fP).length?avg(Object.values(fP)):null;
    return(
      <div style={{minHeight:"100vh",background:"#f5f6fa"}}><div style={{maxWidth:860,margin:"0 auto",padding:"24px 20px"}}>
        <TB t={eEv?"Editar evaluación":"Nueva evaluación 360°"} s={per.nombre} back={()=>{rEv();setPag("empleado");}}/>
        {fMsg&&<div style={{background:fMsg.startsWith("✓")?"#e1f5ee":"#fcebeb",color:fMsg.startsWith("✓")?"#0F6E56":"#E24B4A",borderRadius:8,padding:"10px 16px",marginBottom:14,fontWeight:500,fontSize:13}}>{fMsg}</div>}
        <div className="card">
          <div className="sec-title">Datos generales</div>
          <div className="grid2" style={{marginBottom:14}}>
            <div><span className="lbl">Tipo</span><select value={fT} onChange={e=>setFT(e.target.value)}><option value="jefe">Jefe inmediato</option><option value="par">Par</option><option value="subordinado">Subordinado</option><option value="cliente">Cliente interno</option></select></div>
            <div/>
            <div><span className="lbl">Período desde</span><input type="date" value={fD} onChange={e=>setFD(e.target.value)}/></div>
            <div><span className="lbl">Período hasta</span><input type="date" value={fH} onChange={e=>setFH(e.target.value)}/></div>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span className="lbl" style={{margin:0}}>Evaluadores</span>
            <button className="btn btn-outline btn-sm" onClick={()=>setFEv(p=>[...p,{nombre:"",rol:""}])}>+ Agregar</button>
          </div>
          {fEv.map((ev,i)=>(
            <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
              <input value={ev.nombre} onChange={e=>setFEv(p=>p.map((x,j)=>j===i?{...x,nombre:e.target.value}:x))} placeholder={`Nombre evaluador ${i+1}`} style={{flex:2}}/>
              <input value={ev.rol} onChange={e=>setFEv(p=>p.map((x,j)=>j===i?{...x,rol:e.target.value}:x))} placeholder="Rol/Cargo" style={{flex:1}}/>
              {fEv.length>1&&<button className="btn btn-danger btn-sm" style={{padding:"6px 10px"}} onClick={()=>setFEv(p=>p.filter((_,j)=>j!==i))}>✕</button>}
            </div>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"10px 0 4px"}}>
            <span style={{fontSize:12,color:"#888"}}>{Object.keys(fP).length}/12 calificadas</span>
            {pL!==null&&<span style={{fontSize:13,fontWeight:600,color:cp(pL)}}>Promedio: {pL.toFixed(2)} — {lp(pL)}</span>}
          </div>
          <div className="prog"><div className="prog-fill" style={{width:`${Object.keys(fP).length/12*100}%`,background:GOLD}}/></div>
        </div>
        {COMP.map(c=>(
          <div key={c.id} className="card" style={{padding:"14px 20px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:14}}>
              <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13,marginBottom:2}}>{c.id}. {c.n}</div><div style={{fontSize:11,color:"#999"}}>{c.d}</div></div>
              <div style={{display:"flex",gap:5,flexShrink:0,alignItems:"center"}}>
                {ESCALA.map(e=>{const sel=fP[c.id]===e.v;return<button key={e.v} title={e.l} className="chip" onClick={()=>setFP(p=>({...p,[c.id]:e.v}))} style={{background:sel?e.c:"#f4f4f4",color:sel?"#fff":"#555",borderColor:sel?e.c:"transparent",transform:sel?"scale(1.1)":"scale(1)"}}>{e.v}</button>;})}
                {fP[c.id]!==undefined&&<span style={{fontSize:11,color:ESCALA.find(x=>x.v===fP[c.id])?.c,minWidth:60,fontWeight:600}}>{ESCALA.find(x=>x.v===fP[c.id])?.l}</span>}
              </div>
            </div>
          </div>
        ))}
        <div className="card"><span className="lbl">Observaciones (opcional)</span><div style={{marginTop:4}}><RTE value={fO} onChange={setFO} ph="Escribe observaciones con negrilla, viñetas, numerado..."/></div></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginBottom:24}}>
          <button className="btn btn-outline" onClick={()=>{rEv();setPag("empleado");}}>Cancelar</button>
          <button className="btn btn-gold" style={{opacity:ok?1:.4}} onClick={async()=>{
            if(!ok){setFMsg("Califica todas las competencias y completa el período.");return;}
            const ef=fEv.filter(e=>e.nombre.trim());
            const d={empleado_id:eoId,empleado_nombre:per.nombre,tipo:fT,periodo_desde:fD,periodo_hasta:fH,puntajes:{...fP},observaciones:fO,evaluadores:ef,fecha:new Date().toLocaleDateString("es-CO")};
            if(eEv){await fbSet("evaluaciones",eEv,{...d,id:eEv});setEvaluaciones(p=>p.map(e=>e.id===eEv?{id:eEv,...d}:e));}
            else{const id=uid();await fbSet("evaluaciones",id,{...d,id});setEvaluaciones(p=>[...p,{id,...d}]);}
            setFMsg("✓ Guardado.");setTimeout(()=>{rEv();setPag("empleado");},1000);
          }}>{eEv?"Guardar cambios":"Guardar evaluación"}</button>
        </div>
      </div></div>
    );
  }

  if(pag==="new_auto"&&per){
    const nr=Object.values(aP).filter(v=>typeof v==="number").length;
    return(
      <div style={{minHeight:"100vh",background:"#f5f6fa"}}><div style={{maxWidth:860,margin:"0 auto",padding:"24px 20px"}}>
        <TB t={eAu?"Editar autoevaluación":"Nueva autoevaluación"} s={per.nombre} back={()=>{rAu();setPag("empleado");}}/>
        {aMsg&&<div style={{background:aMsg.startsWith("✓")?"#e1f5ee":"#fcebeb",color:aMsg.startsWith("✓")?"#0F6E56":"#E24B4A",borderRadius:8,padding:"10px 16px",marginBottom:14,fontWeight:500,fontSize:13}}>{aMsg}</div>}
        <div className="card"><div className="sec-title">Autoevaluación — {per.nombre}</div>
          <div style={{fontSize:12,color:"#888",marginBottom:8}}>5=Muy alto · 4=Alto · 3=Medio · 2=Bajo · 1=Muy bajo</div>
          <div className="prog"><div className="prog-fill" style={{width:`${nr/AQ.length*100}%`,background:"#185FA5"}}/></div>
          <div style={{fontSize:11,color:"#aaa",marginTop:4}}>{nr}/{AQ.length} respondidas</div>
        </div>
        {AQ.map(q=>(
          <div key={q.id} className="card" style={{padding:"14px 20px"}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>{q.t}</div>
            <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
              {AE.map(e=>{const sel=aP[q.id]===e.v;return<button key={e.v} onClick={()=>setAP(p=>({...p,[q.id]:e.v}))} style={{padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:sel?700:400,cursor:"pointer",border:sel?"2px solid #185FA5":"1.5px solid #ddd",background:sel?"#185FA5":"#f4f4f4",color:sel?"#fff":"#555",transition:"all .15s",fontFamily:"inherit"}}>{e.v} — {e.l}</button>;})}
            </div>
            <input value={aR[q.id]||""} onChange={e=>setAR(p=>({...p,[q.id]:e.target.value}))} placeholder="Respuesta adicional (opcional)..." style={{fontSize:12}}/>
          </div>
        ))}
        <div className="card"><span className="lbl">Reflexión personal (opcional)</span><div style={{marginTop:4}}><RTE value={aO} onChange={setAO} ph="Escribe una reflexión con negrilla, viñetas, numerado..."/></div></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginBottom:24}}>
          <button className="btn btn-outline" onClick={()=>{rAu();setPag("empleado");}}>Cancelar</button>
          <button className="btn btn-blue" onClick={async()=>{
            const d={empleado_id:eoId,puntajes:{...aP},respuestas:{...aR},observaciones:aO,fecha:new Date().toLocaleDateString("es-CO")};
            if(eAu){await fbSet("autoevals",eAu,{...d,id:eAu});setAutoevals(p=>p.map(a=>a.id===eAu?{id:eAu,...d}:a));}
            else{const id=uid();await fbSet("autoevals",id,{...d,id});setAutoevals(p=>[...p,{id,...d}]);}
            setAMsg("✓ Guardado.");setTimeout(()=>{rAu();setPag("empleado");},1000);
          }}>{eAu?"Guardar cambios":"Guardar autoevaluación"}</button>
        </div>
      </div></div>
    );
  }

  return<div style={{padding:40,color:"#888"}}>Cargando...</div>;
}
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
